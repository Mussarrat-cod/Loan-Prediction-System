version: "3.9"

services:
  backend:
    build: ./xai-backend
    container_name: xai_backend
    ports:
      - "8000:8000"
    env_file:
      - ./xai-backend/.env
    volumes:
      - ./xai-backend:/app
    restart: unless-stopped

  frontend:
    build: ./xai-frontend
    container_name: xai_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
